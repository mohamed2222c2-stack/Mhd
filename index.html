        function initPlayer(videoId) {

        // نطق الكلمة باستعمال Gemini TTS
        async function speakWord(text) {
            const btn = document.getElementById('speak-btn');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-slate-950 border-t-transparent rounded-full animate-spin"></div>`;
            
            const payload = {
                contents: [{ parts: [{ text: `Say clearly: ${text}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: "Kore" }
                        }
                    }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                const base64 = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                
                if (base64) {
                    playWavFromPCM(base64);
                }
            } catch (err) {
                console.error("Error with voice output:", err);
            } finally {
                btn.innerHTML = `<i data-lucide="volume-2" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        }

        function playWavFromPCM(base64Data) {
            const binaryString = window.atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false);
            view.setUint32(4, 36 + len, true);
            view.setUint32(8, 0x57415645, false);
            view.setUint32(12, 0x666d7420, false);
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, 24000, true);
            view.setUint32(28, 24000 * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false);
            view.setUint32(40, len, true);
            
            const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
            const audioUrl = URL.createObjectURL(blob);
            new Audio(audioUrl).play();
        }

        // استخراج كود الفيديو
        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // توليد النص باستدعاء الذكاء الاصطناعي
        async function generateTranscript() {
            const urlInput = document.getElementById('yt-url').value;
            const videoId = extractId(urlInput);
            const msg = document.getElementById('status-msg');
            const btn = document.getElementById('gen-btn');

            if (!videoId) {
                msg.className = "mt-2 text-xs p-3 rounded-lg bg-rose-500/10 text-rose-400 block";
                msg.innerHTML = "عافاك دخل رابط يوتيوب صحيح.";
                return;
            }

            msg.className = "mt-2 text-xs p-3 rounded-lg bg-emerald-500/10 text-emerald-400 block";
            msg.innerHTML = "جاري الاتصال والتحليل بالذكاء الاصطناعي...";
            btn.disabled = true;

            const systemPrompt = `You are an expert language teacher. Transcribe this YouTube video to learn English. Output STRICTLY a JSON object matching this schema:
            {
              "title": "String",
              "transcript": [
                {
                  "id": 1,
                  "start": 0,
                  "end": 4,
                  "text": "Clean English Sentence",
                  "translation": "Moroccan Darija translation",
                  "words": [{"word": "word", "translation": "Darija translation", "pronunciation": "Pronunciation in Arabic letters"}]
                }
              ]
            }`;

            const userPrompt = `Generate a 4-sentence transcript for Video ID: ${videoId}. Ensure the timelines start from 0 to 20 seconds.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userPrompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const data = await response.json();
                const content = JSON.parse(data.candidates[0].content.parts[0].text);

                if (content && content.transcript) {
                    currentVideo = {
                        id: videoId,
                        youtubeId: videoId,
                        title: content.title || "تم الاستيراد بنجاح",
                        language: "English",
                        transcript: content.transcript
                    };
                    renderApp();
                    initPlayer(videoId);
                    msg.innerHTML = "تم جلب النص بنجاح!";
                }
            } catch(e) {
                msg.className = "mt-2 text-xs p-3 rounded-lg bg-rose-500/10 text-rose-400 block";
                msg.innerHTML = "وقع خطأ فالتوليد. يرجى التأكد من الـ API Key وإعادة المحاولة.";
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }

        // التشغيل الأولي
        window.onload = () => {
            renderApp();
        };
    </script>
</body>
</html>
