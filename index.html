                                                            <button onClick={() => updatePersonal('photo', null)} className="text-red-500 hover:bg-red-50 p-2 rounded-full">
                                                                <i className="fas fa-trash"></i>
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Dynamic Sections */}
                                            {Object.keys(state.sections).map(key => {
                                                if (state.sections[key].length > 0) {
                                                    return (
                                                        <SectionEditor 
                                                            key={key} 
                                                            type={key} 
                                                            data={state.sections[key]} 
                                                            onChange={(d) => updateSection(key, d)}
                                                            onDelete={() => removeSection(key)}
                                                        />
                                                    );
                                                }
                                                return null;
                                            })}

                                            {/* Add Section Button */}
                                            <div className="relative group">
                                                <button className="w-full py-3 bg-blue-50 dark:bg-slate-800 text-blue-600 rounded-xl font-bold border border-blue-200 dark:border-slate-600 hover:bg-blue-100 transition flex items-center justify-center gap-2">
                                                    <i className="fas fa-plus-circle"></i> {text.addSection}
                                                </button>
                                                <div className="absolute bottom-full left-0 right-0 mb-2 bg-white dark:bg-slate-800 shadow-xl rounded-xl border border-gray-100 dark:border-slate-700 p-2 hidden group-hover:block z-50">
                                                    {SECTION_TYPES.filter(s => state.sections[s.id].length === 0).map(s => (
                                                        <button key={s.id} onClick={() => addSection(s.id)} className="w-full text-right px-4 py-2 hover:bg-gray-50 dark:hover:bg-slate-700 rounded-lg text-sm flex items-center gap-2">
                                                            <i className={`fas ${s.icon} w-5 text-center text-gray-400`}></i> {isAr ? s.labelAr : s.labelFr}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </motion.div>
                                    )}

                                    {activeTab === 'design' && (
                                        <motion.div key="design" initial={{opacity:0, x:20}} animate={{opacity:1, x:0}} exit={{opacity:0, x:-20}} className="space-y-8">
                                            {/* Templates with Preview */}
                                            <div>
                                                <h3 className="font-bold mb-3 text-sm uppercase text-gray-500">{text.templates}</h3>
                                                <div className="grid grid-cols-2 gap-3">
                                                    {TEMPLATES.map(t => (
                                                        <div key={t.id} className={`template-card relative p-3 rounded-lg border-2 text-center transition-all ${state.settings.template === t.id ? 'border-blue-500 bg-blue-50 dark:bg-slate-800' : 'border-gray-200 dark:border-slate-700'}`}>
                                                            <div className="h-32 bg-gray-200 dark:bg-slate-700 rounded mb-2 relative overflow-hidden template-preview-img transition-all">
                                                                <div className="absolute inset-0 flex items-center justify-center text-gray-400 text-xs font-bold">
                                                                    {t.name}
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center justify-between">
                                                                <span className="text-xs font-bold">{t.name}</span>
                                                                <div className="flex gap-1">
                                                                    <button 
                                                                        onClick={() => openPreview(t)}
                                                                        className="preview-btn px-2 py-1 bg-white text-gray-700 rounded text-xs font-bold shadow-lg hover:bg-gray-100"
                                                                    >
                                                                        <i className="fas fa-eye mr-1"></i>{text.preview}
                                                                    </button>
                                                                    <button 
                                                                        onClick={() => updateSettings('template', t.id)}
                                                                        className={`px-2 py-1 rounded text-xs font-bold transition ${state.settings.template === t.id ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}
                                                                    >
                                                                        {state.settings.template === t.id ? (isAr ? 'مختار' : 'Sélectionné') : text.useTemplate}
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Colors */}
                                            <div>
                                                <h3 className="font-bold mb-3 text-sm uppercase text-gray-500">{text.colors}</h3>
                                                <div className="flex flex-wrap gap-3">
                                                    {COLORS.map(c => (
                                                        <button 
                                                            key={c}
                                                            onClick={() => updateSettings('color', c)}
                                                            className={`w-8 h-8 rounded-full transition-transform hover:scale-110 ${state.settings.color === c ? 'ring-2 ring-offset-2 ring-gray-400' : ''}`}
                                                            style={{ backgroundColor: c }}
                                                        />
                                                    ))}
                                                    <input 
                                                        type="color" 
                                                        value={state.settings.color} 
                                                        onChange={(e) => updateSettings('color', e.target.value)}
                                                        className="w-8 h-8 p-0 border-0 rounded-full overflow-hidden cursor-pointer"
                                                    />
                                                </div>
                                            </div>

                                            {/* Fonts */}
                                            <div>
                                                <h3 className="font-bold mb-3 text-sm uppercase text-gray-500">{text.fonts}</h3>
                                                <div className="space-y-2">
                                                    {[{id:'tajawal',name:'Tajawal'},{id:'cairo',name:'Cairo'},{id:'inter',name:'Inter'}].map(f => (
                                                        <button 
                                                            key={f.id}
                                                            onClick={() => updateSettings('font', f.id)}
                                                            className={`w-full p-3 rounded-lg border text-left flex justify-between items-center ${state.settings.font === f.id ? 'border-blue-500 bg-blue-50 dark:bg-slate-800' : 'border-gray-200 dark:border-slate-700'}`}
                                                        >
                                                            <span style={{fontFamily:f.name}}>{f.name}</span>
                                                            {state.settings.font === f.id && <i className="fas fa-check text-blue-500"></i>}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </motion.div>
                                    )}

                                    {activeTab === 'settings' && (
                                        <motion.div key="settings" initial={{opacity:0, x:20}} animate={{opacity:1, x:0}} exit={{opacity:0, x:-20}} className="space-y-6">
                                            <div className="bg-white dark:bg-slate-800 p-4 rounded-xl border border-gray-100 dark:border-slate-700">
                                                <h3 className="font-bold mb-4">{isAr ? 'إعدادات الصفحة' : 'Mise en page'}</h3>

                                                <div className="mb-4">
                                                    <label className="block text-xs font-bold text-gray-500 mb-2">{text.fontSize}</label>
                                                    <div className="flex bg-gray-100 dark:bg-slate-900 rounded-lg p-1">
                                                        {['small', 'medium', 'large'].map(size => (
                                                            <button 
                                                                key={size}
                                                                onClick={() => updateSettings('fontSize', size)}
                                                                className={`flex-1 py-1 rounded-md text-sm capitalize ${state.settings.fontSize === size ? 'bg-white dark:bg-slate-700 shadow-sm' : 'text-gray-500'}`}
                                                            >
                                                                {size === 'small' ? (isAr ? 'صغير' : 'Petit') : size === 'medium' ? (isAr ? 'متوسط' : 'Moyen') : (isAr ? 'كبير' : 'Grand')}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="mb-4">
                                                    <label className="block text-xs font-bold text-gray-500 mb-2">{text.spacing}</label>
                                                    <div className="flex bg-gray-100 dark:bg-slate-900 rounded-lg p-1">
                                                        {['compact', 'normal', 'spacious'].map(s => (
                                                            <button 
                                                                key={s}
                                                                onClick={() => updateSettings('spacing', s)}
                                                                className={`flex-1 py-1 rounded-md text-sm capitalize ${state.settings.spacing === s ? 'bg-white dark:bg-slate-700 shadow-sm' : 'text-gray-500'}`}
                                                            >
                                                                {s === 'compact' ? (isAr ? 'ضيق' : 'Compact') : s === 'normal' ? (isAr ? 'عادي' : 'Normal') : (isAr ? 'واسع' : 'Aéré')}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </motion.div>
                                    )}
                                </AnimatePresence>
                            </div>

                            {/* Bottom Actions */}
                            <div className="p-4 border-t dark:border-slate-700 bg-gray-50 dark:bg-slate-800 flex gap-3">
                                <button onClick={handleExportPDF} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-500/30 transition flex items-center justify-center gap-2">
                                    <i className="fas fa-file-pdf"></i> {text.download}
                                </button>
                                <button onClick={() => window.print()} className="px-4 py-3 bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl font-bold hover:bg-gray-50 transition">
                                    <i className="fas fa-print"></i>
                                </button>
                            </div>
                        </div>

                        {/* Right Side: Preview */}
                        <div className="flex-1 bg-gray-200 dark:bg-slate-950 overflow-y-auto p-8 relative flex justify-center items-start">
                            <div className="scale-[0.6] md:scale-[0.8] lg:scale-100 origin-top transition-transform duration-300">
                                <ResumePreview />
                            </div>
                        </div>
                    </div>

                    {/* Preview Modal */}
                    <AnimatePresence>
                        {showPreviewModal && previewTemplate && (
                            <motion.div 
                                initial={{opacity:0}} 
                                animate={{opacity:1}} 
                                exit={{opacity:0}}
                            >
                                <TemplatePreviewModal 
                                    template={previewTemplate} 
                                    onClose={() => setShowPreviewModal(false)}
                                    onSelect={(id) => updateSettings('template', id)}
                                />
                            </motion.div>
                        )}
                    </AnimatePresence>
                </AppContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
